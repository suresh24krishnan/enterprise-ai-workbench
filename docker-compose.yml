version: "3.9"

# =============================================================================
# Enterprise AI Workbench — Docker Compose
#
# Single-container configuration: nginx (port 7860) serves the React frontend
# and proxies /api/* to uvicorn (internal port 8000). Compatible with
# Hugging Face Docker Spaces and local Docker runs.
#
# Phase 2+: add enterprise infrastructure services here (PostgreSQL, Redis, etc.)
# =============================================================================

services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-ai-workbench
    ports:
      - "${PORT:-7860}:${PORT:-7860}"
    environment:
      - PORT=${PORT:-7860}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-7860}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
    name: workbench-network
